<head><title>Emby Badges</title>
<style>
.badge-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;}

.badge-label{min-width:160px;font-weight:bold;}
.badge-settings{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.num-field{display:flex;flex-direction:column;align-items:center;gap:2px;}
.num-field label{font-size:0.75em;color:rgba(255,255,255,0.5);margin:0;}
.num-field input{width:68px;text-align:center;}
.section-title{margin:20px 0 6px;font-size:1.05em;font-weight:bold;color:rgba(255,255,255,0.85);border-bottom:1px solid rgba(255,255,255,0.12);padding-bottom:4px;}
</style>
</head>

  <script type="text/javascript">
  (function(){
    var ID='a1b2c3d4-e5f6-7890-abcd-ef1234567890';
    function g(id){return document.getElementById(id);}
    function setPos(prefix,val){var s=g(prefix+'_pos');if(!s)return;for(var i=0;i<s.options.length;i++)if(s.options[i].value===val){s.selectedIndex=i;break;}}
    function fillBadge(cfg,prefix){
      if(!cfg)return;
      var e=g(prefix+'_enabled');if(e)e.checked=cfg.Enabled;
      setPos(prefix,cfg.Position);
      var s=g(prefix+'_size');if(s)s.value=cfg.SizePercent;
      var m=g(prefix+'_margin');if(m)m.value=cfg.MarginPercent;
      var o=g(prefix+'_opacity');if(o)o.value=Math.round(cfg.Opacity*100);
    }
    function readBadge(prefix){
      return{
        Enabled:g(prefix+'_enabled')?g(prefix+'_enabled').checked:false,
        Position:g(prefix+'_pos')?g(prefix+'_pos').value:'BottomLeft',
        SizePercent:g(prefix+'_size')?parseFloat(g(prefix+'_size').value):8,
        MarginPercent:g(prefix+'_margin')?parseFloat(g(prefix+'_margin').value):2,
        Opacity:g(prefix+'_opacity')?parseInt(g(prefix+'_opacity').value,10)/100:0.92
      };
    }
    function load(){
      ApiClient.getPluginConfiguration(ID).then(function(c){
        var e=g('chkEnable');if(e)e.checked=c.EnableBadges;
        fillBadge(c.Sd,'sd');fillBadge(c.Hd,'hd');fillBadge(c.FullHd,'fhd');fillBadge(c.Uhd4K,'uhd');
        fillBadge(c.French,'fr');fillBadge(c.English,'en');fillBadge(c.Vo,'vo');fillBadge(c.MultiVersion,'multi');
        if(typeof Dashboard!=='undefined')Dashboard.hideLoadingMsg();
      });
    }
    function save(e){
      e.preventDefault();
      ApiClient.getPluginConfiguration(ID).then(function(c){
        var en=g('chkEnable');c.EnableBadges=en?en.checked:true;
        c.Sd=readBadge('sd');c.Hd=readBadge('hd');c.FullHd=readBadge('fhd');c.Uhd4K=readBadge('uhd');
        c.French=readBadge('fr');c.English=readBadge('en');c.Vo=readBadge('vo');c.MultiVersion=readBadge('multi');
        ApiClient.updatePluginConfiguration(ID,c).then(function(){
          if(typeof Dashboard!=='undefined')Dashboard.processPluginConfigurationUpdateResult();
        });
      });
      return false;
    }
    var page=document.getElementById('EmbyBadgesConfigPage');
    page.addEventListener('viewshow',load);
    document.getElementById('EmbyBadgesConfigForm').addEventListener('submit',save);
  })();
  </script>
